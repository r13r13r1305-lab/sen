<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN | Netflix Premium</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: #E50914; font-size: 32px; font-weight: 900; }
        .search-bar { width: 100%; padding: 12px; border-radius: 5px; border: none; margin-bottom: 20px; }
        .movie-card { background: #141414; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 15px; }
        .title { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SEN</div>
        <div style="background: #E50914; padding: 5px 10px; border-radius: 5px;">PREMIUM VIP</div>
    </div>

    <input type="text" class="search-bar" placeholder="ابحث عن أفلامك...">

    <div id="movie-list">
        <!-- هنا تظهر الأفلام -->
    </div>

    <script>
        // هذا الكود يعرض الأفلام اللي كانت تطلع عندك
        const movies = [
            {title: "The Dark Knight", year: "2008", rating: "9.0", image: "https://images.metadata.movienco.xyz/posters/tt0468569.jpg", url: "https://vidsrc.to/embed/movie/tt0468569"},
            {title: "Avatar: The Way of Water", year: "2022", rating: "7.6", image: "https://images.metadata.movienco.xyz/posters/tt1630029.jpg", url: "https://vidsrc.to/embed/movie/tt1630029"}
        ];

        const list = document.getElementById('movie-list');
        movies.forEach(m => {
            list.innerHTML += `
                <div class="movie-card" onclick="window.location.href='${m.url}'">
                    <img src="${m.image}">
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <div>${m.rating} ⭐ - ${m.year}</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
